<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TRIBAO | Noyau Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'JetBrains Mono', monospace; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .terminal-box { width: 100%; max-width: 600px; border: 1px solid #222; padding: 40px; border-radius: 12px; background: #111; text-align: center; }
        h1 { font-family: 'Orbitron'; color: #ff4444; letter-spacing: 2px; font-size: 1.2rem; margin-bottom: 30px; }
        
        /* Formulaire de verrouillage */
        #lock-screen input { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: #39FF14; font-family: 'JetBrains Mono'; text-align: center; margin-bottom: 20px; outline: none; }
        .btn-core { width: 100%; background: #ff4444; color: #fff; border: none; padding: 15px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-core:hover { background: #fff; color: #000; }

        /* Interface Admin */
        #admin-content { display: none; text-align: left; }
        .mission-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .btn-export { background: #39FF14; color: #000; border: none; padding: 8px 15px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; border-radius: 4px; font-size: 0.65rem; }
        .status-win { color: #00d4ff; font-weight: bold; font-size: 0.7rem; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="terminal-box">
        <div id="lock-screen">
            <h1>TRIBAO // IDENTIFICATION REQUISE</h1>
            <input type="password" id="adminCode" placeholder="ENTRER CODE D'ACCÈS">
            <button class="btn-core" onclick="unlockSystem()">ENTRER DANS LE NOYAU</button>
            <p id="error-msg" style="color: #ff4444; font-size: 0.7rem; margin-top: 15px; display: none;">ACCÈS REFUSÉ : CODE INVALIDE</p>
        </div>

        <div id="admin-content">
            <h1 style="color: #39FF14;">LOGISTIQUE TRIBAO</h1>
            <p style="font-size: 0.7rem; color: #888; margin-bottom: 20px;">// TERMINAL D'EXTRACTION DE MOBILISATION</p>
            <div id="admin-missions-list">Chargement du flux...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://xcubiufhiclvgnwzagnl.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjdWJpdWZoaWNsdmdud3phZ25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTgwNjgsImV4cCI6MjA4OTE5NDA2OH0.FfP2_9BbiK7uqtFw_3QcUdUQMUSAoYRfpE5l1K5IB1c';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 🛡️ TON CODE D'ACCÈS PERSO (Change-le si tu veux)
        const SECRET_KEY = "TRIBAO2026";

        function unlockSystem() {
            const input = document.getElementById('adminCode').value;
            if (input === SECRET_KEY) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadAdminMissions();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        async function exportMissionData(missionId, missionTitle, pPublic, pCible) {
            // Jointure : on récupère les ralliés et leur nom dans 'profiles'
            const { data, error } = await _supabase
                .from('ralliements')
                .select('user_id, profiles(full_name)')
                .eq('mission_id', missionId);

            if (error || !data || data.length === 0) {
                alert("AUCUN GUERRIER MOBILISÉ SUR CETTE MISSION.");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "MISSION;PRIX_PUBLIC;PRIX_TRIBAO;NOM_GUERRIER;USER_ID\n";

            data.forEach(row => {
                const nom = row.profiles?.full_name || "Inconnu";
                csvContent += `${missionTitle};${pPublic}€;${pCible}€;${nom};${row.user_id}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `MOBILISATION_${missionTitle.replace(/\s+/g, '_')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function loadAdminMissions() {
            const { data, error } = await _supabase.from('missions').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('admin-missions-list');
            
            if (error) {
                container.innerHTML = "ERREUR DE FLUX DB.";
                return;
            }

            container.innerHTML = data.map(m => `
                <div class="mission-row">
                    <div>
                        <div style="font-size: 0.8rem; font-weight: bold;">${m.titre}</div>
                        <div style="font-size: 0.6rem; color: #666;">${m.membres_actuels}/${m.objectif_membres} MOBILISÉS</div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        ${m.statut === 'termine' ? '<span class="status-win">VICTOIRE</span>' : ''}
                        <button class="btn-export" onclick="exportMissionData('${m.id}', '${m.titre}', '${m.prix_public}', '${m.prix_cible}')">CSV</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
