<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRIBAO | Détails de la Mission</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #0a0a0a;
            --bg-sidebar: #121212;
            --card-gray: #1a1a1a;
            --neon-green: #39FF14;
            --neon-gradient: linear-gradient(135deg, #39FF14 0%, #2ecc71 100%);
            --text-main: #f0f0f0;
            --text-gray: #888;
            --border: 1px solid #222;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; font-family: 'Inter', sans-serif; background-color: var(--bg-black); color: var(--text-main); }

        .main-layout { display: flex; min-height: 100vh; width: 100vw; }

        aside { width: 260px; background-color: var(--bg-sidebar); border-right: var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; color: var(--text-gray); text-decoration: none; font-family: 'Orbitron'; font-size: 0.75rem; transition: 0.3s; border-left: 3px solid transparent; }
        .nav-item:hover { color: var(--neon-green); background: rgba(57, 255, 20, 0.05); border-left: 3px solid var(--neon-green); }

        .content-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header { height: 70px; display: flex; align-items: center; padding: 0 30px; border-bottom: var(--border); background: rgba(10,10,10,0.9); }
        .back-link { color: var(--text-gray); text-decoration: none; font-size: 0.8rem; font-family: 'Orbitron'; }

        .mission-grid { display: grid; grid-template-columns: 1fr 450px; min-height: calc(100vh - 70px); }

        .product-visual { background: #000; display: flex; align-items: center; justify-content: center; padding: 40px; border-right: var(--border); }
        .product-visual img { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 8px; box-shadow: 0 0 40px rgba(57, 255, 20, 0.1); }

        .product-data { padding: 60px 40px; background: var(--bg-black); }
        .badge-status { display: inline-block; padding: 5px 12px; border: 1px solid var(--neon-green); color: var(--neon-green); font-family: 'JetBrains Mono'; font-size: 0.7rem; border-radius: 4px; margin-bottom: 20px; }
        
        h1 { font-family: 'Orbitron'; font-size: 2rem; margin: 0 0 15px; letter-spacing: 1px; }
        .target-price { font-family: 'Orbitron'; font-size: 1.8rem; color: var(--neon-green); font-weight: 700; }
        .retail-price { color: var(--text-gray); text-decoration: line-through; margin-left: 15px; font-size: 1rem; }

        .tactic-box { margin-top: 50px; padding: 30px; background: var(--card-gray); border-radius: 12px; border: var(--border); }
        .gauge-bar-lg { width: 100%; height: 12px; background: #000; border-radius: 20px; margin-bottom: 20px; overflow: hidden; border: 1px solid #222; }
        .gauge-fill-lg { height: 100%; width: 0%; background: var(--neon-gradient); box-shadow: 0 0 20px var(--neon-green); transition: width 1s ease-in-out; }

        .btn-enlist { width: 100%; padding: 20px; background: var(--neon-gradient); color: #000; font-family: 'Orbitron'; font-weight: 700; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-enlist:disabled { opacity: 0.7; cursor: not-allowed; filter: grayscale(1); }

        @media (max-width: 1000px) {
            aside { display: none; }
            .mission-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <aside>
            <div style="padding: 30px 25px;"><span style="font-family:'Orbitron'; color:var(--neon-green); font-weight:700;">TRIBAO</span></div>
            <a href="arene.html" class="nav-item">L'ARÈNE</a>
            <a href="dashboard-tribu.html" id="qg-link" class="nav-item" style="display: none;">MON QG</a>
            <a href="contact.html" class="nav-item">SUPPORT</a>
        </aside>

        <div class="content-wrapper">
            <header><a href="arene.html" class="back-link">← RETOUR MISSIONS</a></header>

            <div class="mission-grid" id="mission-content" style="display: none;">
                <div class="product-visual"><img id="mission-img" src="" alt="Produit"></div>
                <div class="product-data">
                    <div class="badge-status">MISSION ACTIVÉE</div>
                    <h1 id="mission-title">Chargement...</h1>
                    <div class="price-info">
                        <span class="target-price" id="mission-price-target">-- €</span>
                        <span class="retail-price" id="mission-price-retail">-- €</span>
                    </div>

                    <div class="tactic-box">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-family:'Orbitron'; font-size:0.8rem;">
                            <span>RALLIEMENT</span>
                            <span id="gauge-text">0 / 0</span>
                        </div>
                        <div class="gauge-bar-lg"><div id="gauge-fill" class="gauge-fill-lg"></div></div>
                        <button class="btn-enlist" onclick="enlistInMission()">REJOINDRE LA MISSION</button>
                    </div>
                </div>
            </div>
            <div id="loading-state" style="padding: 100px; text-align: center; font-family: 'Orbitron'; color: var(--neon-green);">// ANALYSE EN COURS...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://xcubiufhiclvgnwzagnl.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjdWJpdWZoaWNsdmdud3phZ25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTgwNjgsImV4cCI6MjA4OTE5NDA2OH0.FfP2_9BbiK7uqtFw_3QcUdUQMUSAoYRfpE5l1K5IB1c';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const missionId = urlParams.get('id');

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                document.getElementById('qg-link').style.display = 'flex';
            }
        }

        async function loadMission() {
            const { data: m } = await _supabase.from('missions').select('*').eq('id', missionId).single();
            if (!m) return;

            document.getElementById('mission-title').innerText = m.titre;
            document.getElementById('mission-img').src = m.image_url;
            document.getElementById('mission-price-target').innerText = m.prix_cible + " €";
            document.getElementById('mission-price-retail').innerText = Math.round(m.prix_cible * 1.35) + " €";

            const progress = Math.min(100, Math.round((m.membres_actuels / m.objectif_membres) * 100));
            document.getElementById('gauge-text').innerText = `${m.membres_actuels} / ${m.objectif_membres}`;
            document.getElementById('gauge-fill').style.width = progress + "%";

            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('mission-content').style.display = 'grid';
        }

        async function enlistInMission() {
            const { data: { session } } = await _supabase.auth.getSession();

            if (!session) {
                localStorage.setItem('pending_mission_id', missionId);
                window.location.href = 'auth.html';
                return; 
            }

            const userRole = session.user.user_metadata.role;
            if (userRole === 'pro') {
                alert("ACCÈS REFUSÉ : Les Fournisseurs ne peuvent pas rallier de missions.");
                return; 
            }

            const btn = document.querySelector('.btn-enlist');
            btn.innerText = "// TRANSMISSION...";
            btn.disabled = true;

            // 1. On crée le lien dans la table 'ralliements'
            const { error: linkError } = await _supabase
                .from('ralliements')
                .insert([{ user_id: session.user.id, mission_id: missionId }]);

            if (linkError) {
                alert("Erreur technique ou mission déjà ralliée.");
                btn.disabled = false;
                btn.innerText = "REJOINDRE LA MISSION";
                return;
            }

            // 2. On met à jour le compteur dans 'missions'
            const { data: m } = await _supabase.from('missions').select('membres_actuels').eq('id', missionId).single();
            const { error } = await _supabase.from('missions').update({ membres_actuels: m.membres_actuels + 1 }).eq('id', missionId);

            if (!error) {
                alert("ENGAGEMENT VALIDÉ ! Retrouvez cette mission dans votre QG.");
                loadMission();
                btn.innerText = "MISSION REJOINTE";
            } else {
                alert("Erreur lors de la mise à jour du compteur.");
                btn.disabled = false;
                btn.innerText = "REJOINDRE LA MISSION";
            }
        }

        checkSession();
        loadMission();
    </script>
</body>
</html>
