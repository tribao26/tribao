<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRIBAO | QG du Guerrier</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #0a0a0a;
            --bg-sidebar: #121212;
            --card-gray: #1a1a1a;
            --neon-green: #39FF14;
            --neon-blue: #00d4ff;
            --neon-gradient: linear-gradient(135deg, #39FF14 0%, #2ecc71 100%);
            --text-main: #f0f0f0;
            --text-gray: #888;
            --border: 1px solid #222;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background-color: var(--bg-black); color: var(--text-main); overflow: hidden; }

        .main-layout { display: flex; height: 100vh; width: 100vw; }

        aside { width: 260px; background-color: var(--bg-sidebar); border-right: var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-label { padding: 30px 25px 10px; font-size: 0.65rem; color: #444; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .nav-item { padding: 15px 25px; color: var(--text-gray); text-decoration: none; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; display: flex; align-items: center; transition: 0.3s; border-left: 3px solid transparent; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: var(--neon-green); background: rgba(57, 255, 20, 0.05); border-left: 3px solid var(--neon-green); }
        .nav-footer { margin-top: auto; border-top: var(--border); padding: 10px 0; }

        .content-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; background: rgba(10, 10, 10, 0.9); border-bottom: var(--border); flex-shrink: 0; }
        .logo-header { font-family: 'Orbitron', sans-serif; color: var(--neon-green); font-weight: 700; font-size: 1.3rem; letter-spacing: 3px; }
        .user-rank { font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 5px 10px; border-radius: 4px; transition: 0.5s; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 40px; }
        .dashboard-grid { max-width: 1100px; margin: 0 auto; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-gray); border: var(--border); padding: 25px; border-radius: 12px; position: relative; overflow: hidden; }
        .stat-card::after { content: ""; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--neon-green); }
        .stat-card span { display: block; font-family: 'Orbitron'; font-size: 0.65rem; color: var(--text-gray); margin-bottom: 10px; }
        .stat-card h3 { margin: 0; font-family: 'JetBrains Mono'; font-size: 1.8rem; color: #fff; }

        .recruit-box { grid-column: 1 / -1; border: 1px dashed var(--neon-green); background: rgba(57, 255, 20, 0.02); }
        .recruit-box::after { display: none; }
        .recruit-group { display: flex; gap: 10px; margin-top: 15px; }
        .recruit-input { flex: 1; background: #000; border: 1px solid #333; padding: 12px; color: var(--neon-green); font-family: 'JetBrains Mono'; font-size: 0.75rem; border-radius: 4px; outline: none; }
        .btn-copy { background: var(--neon-green); color: #000; border: none; padding: 0 20px; font-family: 'Orbitron'; font-weight: 700; font-size: 0.7rem; border-radius: 4px; cursor: pointer; transition: 0.3s; }

        .section-header { font-family: 'Orbitron'; font-size: 0.9rem; margin-bottom: 25px; letter-spacing: 2px; color: var(--text-gray); display: flex; align-items: center; gap: 15px; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: #222; }

        .active-mission {
            background: rgba(20, 20, 20, 0.5); border: var(--border); border-radius: 12px; padding: 25px;
            display: grid; grid-template-columns: 80px 1fr 200px; align-items: center; gap: 25px; margin-bottom: 15px;
        }
        .mission-icon { width: 60px; height: 60px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; overflow: hidden; }
        .mission-icon img { width: 100%; height: 100%; object-fit: cover; }
        .mission-name h4 { margin: 0 0 5px; font-family: 'Orbitron'; font-size: 1rem; }
        .mission-name p { margin: 0; font-size: 0.8rem; color: var(--text-gray); }
        
        .mission-progress { text-align: right; }
        .mini-gauge { width: 100%; height: 6px; background: #000; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .mini-fill { height: 100%; background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); transition: width 1s; }
        .mini-fill.full { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .coupon-box { 
            background: #000; border: 1px solid var(--neon-blue); color: var(--neon-blue); 
            padding: 8px 12px; border-radius: 4px; font-family: 'JetBrains Mono'; font-size: 0.8rem; margin-top: 5px; display: inline-block;
        }

        @media (max-width: 850px) {
            .main-layout { flex-direction: column; }
            aside { width: 100%; height: auto; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: var(--border); }
            .nav-label { display: none; }
            .nav-item { border-left: none; border-bottom: 3px solid transparent; }
            .nav-item.active { border-bottom: 3px solid var(--neon-green); }
            .active-mission { grid-template-columns: 1fr; text-align: center; }
            .mission-icon { margin: 0 auto; }
            .mission-progress { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <aside>
            <div class="nav-label" id="unit-id">UNITÉ : ---</div>
            <a href="arene.html" class="nav-item">L'ARÈNE</a>
            <a href="#" id="menu-home" class="nav-item active" onclick="switchView('home')">MON QG</a>
            <a href="#" id="menu-arsenal" class="nav-item" onclick="switchView('arsenal')">PORTEFEUILLE</a>
            <a href="#" class="nav-item">MES COMMANDES</a>
            
            <div class="nav-footer">
                <a href="#" onclick="handleLogout(event)" class="nav-item" style="color:#ff4444;">DÉCONNEXION</a>
            </div>
        </aside>

        <div class="content-wrapper">
            <header>
                <div class="logo-header">TRIBAO</div>
                <div class="user-rank" id="display-rank">CHARGEMENT...</div>
            </header>

            <div class="scroll-area">
                <div class="dashboard-grid">
                    <div id="view-home">
                        <div class="stats-row">
                            <div class="stat-card"><span>RECRUES DIRECTES</span><h3 id="stat-recrues">00</h3></div>
                            <div class="stat-card"><span>MISSIONS REJOINTES</span><h3 id="stat-count">00</h3></div>
                            <div class="stat-card"><span>POINTS D'INFLUENCE</span><h3 id="stat-pts">0</h3></div>
                            <div class="stat-card recruit-box">
                                <span>LIEN DE PARRAINAGE</span>
                                <div class="recruit-group">
                                    <input type="text" id="ref-link" class="recruit-input" readonly value="...">
                                    <button onclick="copyLink()" class="btn-copy">COPIER</button>
                                </div>
                            </div>
                        </div>
                        <h2 class="section-header">MES ENGAGEMENTS ACTIFS</h2>
                        <div id="my-missions-container"></div>
                    </div>

                    <div id="view-arsenal" style="display: none;">
                        <div class="stats-row">
                            <div class="stat-card" style="border-color: var(--neon-blue);"><span>CASHBACK DISPONIBLE</span><h3 style="color: var(--neon-blue);">0.00 €</h3></div>
                            <div class="stat-card"><span>ÉCONOMIES RÉALISÉES</span><h3 id="stat-eco">0.00 €</h3></div>
                        </div>
                        <h2 class="section-header">MES BONS DE VICTOIRE (CODES UNIQUES)</h2>
                        <div id="coupons-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://xcubiufhiclvgnwzagnl.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjdWJpdWZoaWNsdmdud3phZ25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTgwNjgsImV4cCI6MjA4OTE5NDA2OH0.FfP2_9BbiK7uqtFw_3QcUdUQMUSAoYRfpE5l1K5IB1c';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function switchView(view) {
            document.getElementById('view-home').style.display = (view === 'home') ? 'block' : 'none';
            document.getElementById('view-arsenal').style.display = (view === 'arsenal') ? 'block' : 'none';
            document.getElementById('menu-home').classList.toggle('active', view === 'home');
            document.getElementById('menu-arsenal').classList.toggle('active', view === 'arsenal');
        }

        async function getOrAssignCoupon(missionId, userId) {
            // 1. Vérifier si déjà attribué
            const { data: existing } = await _supabase.from('coupons_uniques').select('code').eq('mission_id', missionId).eq('attribue_a', userId).maybeSingle();
            if (existing) return existing.code;

            // 2. Sinon, prendre un code libre
            const { data: freeCode } = await _supabase.from('coupons_uniques').select('*').eq('mission_id', missionId).is('attribue_a', null).limit(1).maybeSingle();
            if (freeCode) {
                await _supabase.from('coupons_uniques').update({ attribue_a: userId }).eq('id', freeCode.id);
                return freeCode.code;
            }
            return "EN ATTENTE DE CODES...";
        }

        async function initDashboard() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'auth.html'; return; }
            const user = session.user;
            
            document.getElementById('unit-id').innerText = `UNITÉ : ${(user.user_metadata.full_name || user.email.split('@')[0]).toUpperCase()}`;
            document.getElementById('ref-link').value = window.location.origin + "/auth.html?ref=" + user.id;

            const { data: ralliements } = await _supabase.from('ralliements').select('mission_id, missions (*)').eq('user_id', user.id);
            const { data: parrainages } = await _supabase.from('parrainages').select('*').eq('parrain_id', user.id);

            const mCount = ralliements ? ralliements.length : 0;
            const pCount = parrainages ? parrainages.length : 0;
            const totalPoints = (mCount * 150) + (pCount * 50);

            document.getElementById('stat-count').innerText = mCount.toString().padStart(2, '0');
            document.getElementById('stat-recrues').innerText = pCount.toString().padStart(2, '0');
            document.getElementById('stat-pts').innerText = totalPoints;

            let rank = "SOLDAT";
            if (totalPoints > 1500) rank = "LÉGENDE"; else if (totalPoints > 800) rank = "CENTURION"; else if (totalPoints > 300) rank = "ÉCLAIREUR";
            document.getElementById('display-rank').innerText = "RANG : " + rank;

            const container = document.getElementById('my-missions-container');
            const arsenal = document.getElementById('coupons-container');
            
            if (!ralliements || ralliements.length === 0) {
                container.innerHTML = "<p>// AUCUNE MISSION.</p>";
                arsenal.innerHTML = "<p>// AUCUN BON DÉBLOQUÉ.</p>";
                return;
            }

            let missionHTML = "";
            let arsenalHTML = "";

            for (const item of ralliements) {
                const m = item.missions;
                if (!m) continue;
                const isFull = m.statut === 'termine';
                const progress = Math.min(100, Math.round((m.membres_actuels / m.objectif_membres) * 100));
                
                let myCode = "";
                if (isFull) {
                    myCode = await getOrAssignCoupon(m.id, user.id);
                    arsenalHTML += `
                        <div class="stat-card" style="margin-bottom:10px; border-color:var(--neon-blue)">
                            <span>${m.titre}</span>
                            <div class="coupon-box">${myCode}</div>
                        </div>`;
                }

                missionHTML += `
                    <div class="active-mission" style="${isFull ? 'border-color:var(--neon-blue)' : ''}">
                        <div class="mission-icon"><img src="${m.image_url || 'https://via.placeholder.com/60'}"></div>
                        <div class="mission-name">
                            <h4 style="${isFull ? 'color:var(--neon-blue)' : ''}">${m.titre}</h4>
                            <p>${isFull ? '🏆 CODE DÉBLOQUÉ' : 'Cible : ' + m.prix_cible + '€'}</p>
                            ${isFull ? `<div class="coupon-box">${myCode}</div>` : ''}
                        </div>
                        <div class="mission-progress">
                            <span style="font-size: 0.8rem; color: ${isFull ? 'var(--neon-blue)' : 'inherit'}">${isFull ? 'VICTOIRE' : progress + '%'}</span>
                            <div class="mini-gauge"><div class="mini-fill ${isFull ? 'full' : ''}" style="width: ${progress}%;"></div></div>
                        </div>
                    </div>`;
            }

            container.innerHTML = missionHTML;
            arsenal.innerHTML = arsenalHTML || "<p>// LES BONS S'AFFICHERONT ICI APRÈS LA VICTOIRE.</p>";
        }

        function copyLink() {
            const el = document.getElementById("ref-link"); el.select();
            navigator.clipboard.writeText(el.value); alert("Lien copié !");
        }

        async function handleLogout(e) {
            e.preventDefault(); await _supabase.auth.signOut(); window.location.href = 'index.html';
        }

        initDashboard();
    </script>
</body>
</html>
